      (function () {

        // Keep sending ready message until we get init response
        let readyInterval = null;

        /* The values of this mapping must match the values in the Facebook CAPI destinations in Segment

           We have to do this mapping because the Facebook Pixel integration from Segment does not support
           event renaming on the client side

        const FB_EVENT_MAPPING = {
          "onboarding.started": "Started Onboarding",
          "extended_onboarding.started": "Started Onboarding",
          "extended_onboarding.completed": "CompleteRegistration",
          "chat.conversation.first_conversation_created": "NewConversation",
          payment_state_success: "Purchase",
        };

        // Floodlight activity tag resolver: returns the CM360 send_to string
        // for an event, or null if the event has no Floodlight conversion.
        // Format: DC-ADVERTISER_ID/activity_group/activity_tag+counting_method
        function resolveFloodlightSendTo(event, properties) {
          var props = properties || {};
          switch (event) {
            case "extended_onboarding.completed":
              // CM360: Onboarding Completed [production]
              return "DC-15684265/check0/onboa000+unique";
            case "payment_state_success":
              if (props.product_capability === "claude_pro") {
                // CM360: Purchased Pro [production]
